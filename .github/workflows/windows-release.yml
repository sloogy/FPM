name: Windows Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows portable ZIP and installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Run release checks
        shell: pwsh
        run: |
          python tools/sync_version.py --check
          python -m compileall -q .
          python -m pytest -q
          $env:QT_QPA_PLATFORM = "offscreen"
          python tools/gui_smoke_test.py
          python tools/i18n_audit.py
          python tools/i18n_quality_audit.py
          python tools/i18n_key_wiring_audit.py
          python tools/i18n_runtime_audit.py
          python tools/i18n_visible_text_audit.py

      - name: Build Windows release assets
        shell: pwsh
        run: python tools/build_windows.py --clean --base-url "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fountainpen-manager-windows-release
          path: |
            release/*.zip
            release/*.exe
            release/latest.json
            release/SHA256SUMS.txt

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.zip
            release/*.exe
            release/latest.json
            release/SHA256SUMS.txt
