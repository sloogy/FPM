name: Release Check

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  static-release-check:
    name: Static release checks
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install runtime and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Compile Python sources
        run: python -m compileall -q .

      - name: Run unit and regression tests
        run: python -m pytest -q

      - name: Run Qt GUI smoke test
        run: python tools/gui_smoke_test.py

      - name: Run i18n audits
        run: |
          python tools/i18n_audit.py
          python tools/i18n_quality_audit.py
          python tools/i18n_key_wiring_audit.py
          python tools/i18n_runtime_audit.py
          python tools/i18n_visible_text_audit.py
